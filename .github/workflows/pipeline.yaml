name: Full CI/CD Pipeline

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:

env:
  REGISTRY: localhost:5000
  IMAGE_TAG: ${{ github.sha }}

jobs:

# =========================
# 1. LINT STAGE
# =========================
  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # Python lint
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python lint tools
        run: pip install flake8 pytest

      - name: Python Lint (API + Worker)
        run: |
          flake8 api worker

      # JS lint
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install ESLint
        run: npm install -g eslint

      - name: JS Lint (Frontend)
        run: eslint frontend || true

      # Dockerfile lint
      - name: Install Hadolint
        run: |
          wget -O hadolint https://github.com/hadolint/hadolint/releases/latest/download/hadolint-Linux-x86_64
          chmod +x hadolint
          sudo mv hadolint /usr/local/bin/

      - name: Lint Dockerfiles
        run: hadolint api/Dockerfile worker/Dockerfile frontend/Dockerfile


# =========================
# 2. TEST STAGE
# =========================
  test:
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install pytest pytest-cov fastapi redis

      - name: Run Unit Tests
        run: |
          pytest api/tests --cov=api --cov-report=xml

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml


# =========================
# 3. BUILD + PUSH TO LOCAL REGISTRY
# =========================
  build:
    runs-on: ubuntu-latest
    needs: test

    services:
      registry:
        image: registry:2
        ports:
          - 5000:5000

    steps:
      - uses: actions/checkout@v4

      - name: Build API image
        run: |
          docker build -t localhost:5000/api:${IMAGE_TAG} ./api
          docker tag localhost:5000/api:${IMAGE_TAG} localhost:5000/api:latest

      - name: Build Worker image
        run: |
          docker build -t localhost:5000/worker:${IMAGE_TAG} ./worker
          docker tag localhost:5000/worker:${IMAGE_TAG} localhost:5000/worker:latest

      - name: Build Frontend image
        run: |
          docker build -t localhost:5000/frontend:${IMAGE_TAG} ./frontend
          docker tag localhost:5000/frontend:${IMAGE_TAG} localhost:5000/frontend:latest

      - name: Push images
        run: |
          docker push localhost:5000/api:${IMAGE_TAG}
          docker push localhost:5000/api:latest
          docker push localhost:5000/worker:${IMAGE_TAG}
          docker push localhost:5000/worker:latest
          docker push localhost:5000/frontend:${IMAGE_TAG}
          docker push localhost:5000/frontend:latest


# =========================
# 4. SECURITY SCAN (TRIVY)
# =========================
  security:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Install Trivy
        run: |
          sudo apt-get update
          sudo apt-get install -y wget
          wget https://github.com/aquasecurity/trivy/releases/latest/download/trivy_0.49.1_Linux-64bit.deb
          sudo dpkg -i trivy_0.49.1_Linux-64bit.deb

      - name: Scan API image
        run: |
          trivy image --severity CRITICAL --exit-code 1 localhost:5000/api:latest

      - name: Scan Worker image
        run: |
          trivy image --severity CRITICAL --exit-code 1 localhost:5000/worker:latest

      - name: Scan Frontend image
        run: |
          trivy image --severity CRITICAL --exit-code 1 localhost:5000/frontend:latest

      - name: Upload SARIF report
        run: |
          trivy image --format sarif -o trivy-report.sarif localhost:5000/api:latest || true

      - uses: actions/upload-artifact@v4
        with:
          name: trivy-report
          path: trivy-report.sarif


# =========================
# 5. INTEGRATION TEST (FULL STACK)
# =========================
  integration:
    runs-on: ubuntu-latest
    needs: security

    steps:
      - uses: actions/checkout@v4

      - name: Start full stack
        run: |
          docker compose up -d --build

      - name: Wait for API
        run: |
          timeout 60 bash -c 'until curl -f http://localhost:8000/health; do sleep 2; done'

      - name: Submit job
        run: |
          curl -X POST http://localhost:8000/jobs -o response.json

      - name: Extract job ID
        run: |
          echo "JOB_ID=$(cat response.json | python -c 'import sys,json; print(json.load(sys.stdin)["job_id"])')" >> $GITHUB_ENV

      - name: Poll until complete
        run: |
          for i in {1..20}; do
            STATUS=$(curl -s http://localhost:8000/jobs/$JOB_ID | python -c "import sys,json; print(json.load(sys.stdin).get('status'))")
            echo "Status: $STATUS"
            if [ "$STATUS" = "completed" ]; then exit 0; fi
            sleep 2
          done
          exit 1

      - name: Tear down stack
        if: always()
        run: docker compose down -v


# =========================
# 6. DEPLOY (ROLLING UPDATE)
# =========================
  deploy:
    runs-on: ubuntu-latest
    needs: integration
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Pull latest images
        run: |
          docker pull localhost:5000/api:latest
          docker pull localhost:5000/worker:latest
          docker pull localhost:5000/frontend:latest

      - name: Rolling update (safe deploy)
        run: |
          docker compose down
          docker compose up -d

      - name: Health check (60s timeout)
        run: |
          timeout 60 bash -c 'until curl -f http://localhost:8000/health; do sleep 2; done' || (
            echo "Deployment failed - keeping old containers"
            exit 1
          )
