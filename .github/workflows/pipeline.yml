name: CI/CD Pipeline

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

permissions:
  contents: read
  security-events: write

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2

      - name: Set up Python
        uses: actions/setup-python@v5.6.0
        with:
          python-version: "3.12"

      - name: Install Python lint tools
        run: pip install flake8

      - name: Lint Python files
        run: flake8 api/main.py worker/worker.py --max-line-length=120 --ignore=E302,E305,W292

      - name: Set up Node
        uses: actions/setup-node@v4.4.0
        with:
          node-version: "20"

      - name: Install JS lint tools
        run: |
          cd frontend
          npm install

      - name: Lint JavaScript
        run: |
          cd frontend
          npx eslint app.js

      - name: Lint API Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: api/Dockerfile

      - name: Lint worker Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: worker/Dockerfile

      - name: Lint frontend Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: frontend/Dockerfile

  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4.2.2

      - name: Set up Python
        uses: actions/setup-python@v5.6.0
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest-cov

      - name: Run tests with coverage
        run: |
          pytest api/tests --cov=api --cov-report=html --cov-report=xml -v

      - name: Upload coverage report
        uses: actions/upload-artifact@v4.6.2
        with:
          name: coverage-report
          path: htmlcov/

  build:
    runs-on: ubuntu-latest
    needs: test
    services:
      registry:
        image: registry:2
        ports:
          - 5000:5000

    steps:
      - uses: actions/checkout@v4.2.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: network=host

      - name: Build and push API image
        run: |
          docker build -t localhost:5000/api:${{ github.sha }} -t localhost:5000/api:latest ./api
          docker push localhost:5000/api:${{ github.sha }}
          docker push localhost:5000/api:latest

      - name: Build and push worker image
        run: |
          docker build -t localhost:5000/worker:${{ github.sha }} -t localhost:5000/worker:latest ./worker
          docker push localhost:5000/worker:${{ github.sha }}
          docker push localhost:5000/worker:latest

      - name: Build and push frontend image
        run: |
          docker build -t localhost:5000/frontend:${{ github.sha }} -t localhost:5000/frontend:latest ./frontend
          docker push localhost:5000/frontend:${{ github.sha }}
          docker push localhost:5000/frontend:latest

  security-scan:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
      security-events: write
    services:
      registry:
        image: registry:2
        ports:
          - 5000:5000

    steps:
      - uses: actions/checkout@v4.2.2

      - name: Rebuild images for scanning
        run: |
          docker build -t localhost:5000/api:latest ./api
          docker build -t localhost:5000/worker:latest ./worker
          docker build -t localhost:5000/frontend:latest ./frontend

      - name: Install Trivy
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin v0.70.0

      - name: Show critical vulnerabilities
        run: |
          trivy image --skip-version-check --severity CRITICAL \
            --format table --exit-code 0 \
            localhost:5000/api:latest
          trivy image --skip-version-check --severity CRITICAL \
            --format table --exit-code 0 \
            localhost:5000/worker:latest
          trivy image --skip-version-check --severity CRITICAL \
            --format table --exit-code 0 \
            localhost:5000/frontend:latest

      - name: Scan API image
        run: |
          trivy image --skip-version-check --severity CRITICAL \
            --format sarif --output api-trivy.sarif \
            --exit-code 1 \
            localhost:5000/api:latest

      - name: Scan worker image
        run: |
          trivy image --skip-version-check --severity CRITICAL \
            --format sarif --output worker-trivy.sarif \
            --exit-code 1 \
            localhost:5000/worker:latest

      - name: Scan frontend image
        run: |
          trivy image --skip-version-check --severity CRITICAL \
            --format sarif --output frontend-trivy.sarif \
            --exit-code 1 \
            localhost:5000/frontend:latest

      - name: Upload SARIF results
        uses: actions/upload-artifact@v4.6.2
        if: always()
        with:
          name: trivy-sarif-results
          path: |
            api-trivy.sarif
            worker-trivy.sarif
            frontend-trivy.sarif

  integration-test:
    runs-on: ubuntu-latest
    needs: security-scan
    steps:
      - uses: actions/checkout@v4.2.2

      - name: Create .env file
        run: |
          cat > .env << EOF
          REDIS_HOST=redis
          REDIS_PORT=6379
          API_URL=http://api:8000
          API_PORT=8000
          FRONTEND_PORT=3000
          EOF

      - name: Start full stack
        run: docker compose up --build -d

      - name: Wait for services to be healthy
        run: |
          echo "Waiting for services..."
          timeout 120 bash -c 'until docker compose ps | grep -E "frontend.*healthy"; do sleep 5; done'

      - name: Submit a job and poll for completion
        run: |
          RESPONSE=$(curl -s -X POST http://localhost:3000/submit)
          echo "Response: $RESPONSE"
          JOB_ID=$(echo $RESPONSE | python3 -c "import sys,json; print(json.load(sys.stdin)['job_id'])")
          echo "Job ID: $JOB_ID"

          for i in $(seq 1 30); do
            STATUS=$(curl -s http://localhost:3000/status/$JOB_ID | python3 -c "import sys,json; print(json.load(sys.stdin)['status'])")
            echo "Status: $STATUS"
            if [ "$STATUS" = "completed" ]; then
              echo "Job completed successfully"
              exit 0
            fi
            sleep 2
          done
          echo "Job did not complete in time"
          exit 1

      - name: Tear down stack
        if: always()
        run: docker compose down

  deploy:
    runs-on: ubuntu-latest
    needs: integration-test
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4.2.2

      - name: Deploy with rolling update
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_KEY: ${{ secrets.DEPLOY_KEY }}
        run: |
          echo "$DEPLOY_KEY" > /tmp/deploy_key
          chmod 600 /tmp/deploy_key
          ssh -i /tmp/deploy_key -o StrictHostKeyChecking=no $DEPLOY_USER@$DEPLOY_HOST << 'ENDSSH'
            cd ~/hng14-stage2-devops
            git pull origin main
            docker compose build

            for SERVICE in api worker frontend; do
              echo "Updating $SERVICE..."
              docker compose up -d --no-deps --build $SERVICE

              SECONDS=0
              while [ $SECONDS -lt 60 ]; do
                STATUS=$(docker compose ps $SERVICE | grep "healthy" || true)
                if [ -n "$STATUS" ]; then
                  echo "$SERVICE is healthy"
                  break
                fi
                sleep 5
                SECONDS=$((SECONDS + 5))
              done

              if [ -z "$STATUS" ]; then
                echo "$SERVICE failed health check, aborting"
                exit 1
              fi
            done
          ENDSSH
